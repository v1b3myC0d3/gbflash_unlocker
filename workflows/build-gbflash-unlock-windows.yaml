name: Build GBFlash Unlocker (Windows)

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: pwsh
        working-directory: .
    env:
      VERSION: ${{ github.event.release.tag_name || '0.0' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-gbflash-unlock.txt

      - name: Build GBFlash Unlocker
        env:
          PYINSTALLER_CONFIG_DIR: ${{ github.workspace }}\.pyinstaller
        run: |
          python -m PyInstaller --clean --noconfirm gbflash_unlock.spec

      - name: Create ZIP archive
        run: |
          $name = "GBFlashUnlock-${{ env.VERSION }}_Windows-x64"
          if (Test-Path "dist\gbflash-unlock") {
            Compress-Archive -Path "dist\gbflash-unlock\*" -DestinationPath "${name}.zip" -CompressionLevel Optimal
          } else {
            Write-Error "Build output not found at dist\gbflash-unlock"
            exit 1
          }

      - name: Create artifact
        if: env.VERSION == '0.0'
        uses: actions/upload-artifact@v4
        with:
          name: GBFlashUnlock_Windows-x64
          path: GBFlashUnlock-${{ env.VERSION }}_Windows-x64.zip

      - name: Upload release asset
        if: env.VERSION != '0.0'
        uses: softprops/action-gh-release@v2.0.8
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: GBFlashUnlock-${{ env.VERSION }}_Windows-x64.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

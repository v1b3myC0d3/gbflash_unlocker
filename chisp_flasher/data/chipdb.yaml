meta:
  format: chisp-chipdb
  version: 14
  project_name: CHISP Flasher
  scope:
    families:
    - CH32F
    - CH32V
    - CH32X
    - CH32L
    - CH54
    - CH55
    - CH56
    - CH57
    - CH58
    - CH59
    transports:
    - serial
    - usb
  rules:
    vendor_files_are_hints_not_truth: true
    gui_is_data_driven: true
    backend_owns_protocol: true
backend_families:
  ch32x103:
    option_profile: x103
    flash_defaults:
      default_chunk_size: 56
      default_initial_baud: 115200
      default_fast_baud: 1000000
      default_preserve_user_word: true
    target_v1: true
    vendor_mcu_types:
    - 4
    - 5
    chips:
    - CH32F103
    - CH32V103
    expected_device_types:
      CH32F103:
      - 20
      CH32V103:
      - 21
    gui_profiles:
      serial:
      - x103_serial
      usb:
      - x103_usb
    protocol_variants:
    - uart_framed
    - usb_native_plain
    cross_check:
      wchisp_device_types:
        CH32F103: 20
        CH32V103: 21
      x103_gui_long_delay_maps_to_porctr: true
    protocol_note: uart_framed path inferred from family-level support and shared
      config layout
  ch32v20x:
    option_profile: fv20x
    flash_defaults:
      default_initial_baud: 115200
      default_fast_baud: 1000000
      CH32V203:
        chunk_size: 56
        sector_size: 1024
        erase_sectors: 64
        initial_baud: 115200
        fast_baud: 1000000
        verify_every: 1
        verify_last: true
        default_seed_len: 30
        default_seed_random: false
      CH32V208:
        initial_baud: 115200
        fast_baud: 1000000
    target_v1: true
    vendor_mcu_types:
    - 9
    chips:
    - CH32V203
    - CH32V208
    expected_device_types:
      CH32V203:
      - 25
      CH32V208:
      - 25
    working_backend_status:
      CH32V203: implemented_from_bmcu_flasher_baseline
      CH32V208: not_yet_verified
    identify_request_defaults:
      CH32V203:
        observed_device_id: 49
        observed_device_type: 25
        banner: MCU ISP & WCH.CN
    gui_profiles:
      serial:
      - v20x_serial_v203
      - v20x_serial_v208
      usb:
      - v20x_usb
    known_flows:
      serial_ttl:
        status: verified_from_capture
        chip: CH32V203C8T6
        sequence:
        - A1
        - A7
        - A8_step1
        - A7
        - A2_reason_01
        - A1
        - A7
        - A1
        - A7
        - A8_step2
        - A7
        - A3
        - A4
        - C5
        - A5_many
        - A5_flush
        - A3
        - A6_many
        - A2_reason_00
      usb_auto_di:
        status: partly_decoded_from_capture
        chip: CH32V203C8T6
        sequence_shape:
        - A1
        - A7
        - A8_step1
        - A7
        - A2_reason_01
        - A1
        - A7
        - A1
        - A7
        - A8_step2
        - A7
        - A3
        - A4
        - C5
        - A5_many
        - A5_flush
        - A3
        - A6_many
        - A2_reason_00
    protocol_variants:
    - uart_framed
    - usb_native_plain
    cross_check:
      official_bootloader_interfaces:
      - USART1
      - USB
      wchisp_device_type: 25
  ch32v30x:
    option_profile: fv30x
    flash_defaults_serial_inferred:
      default_chunk_size: 56
      default_initial_baud: 115200
      default_fast_baud: 1000000
      default_preserve_user_word: true
    target_v1: true
    vendor_mcu_types:
    - 7
    chips:
    - CH32V303
    - CH32V305
    - CH32V307
    - CH32V317
    expected_device_types:
      CH32V303:
      - 23
      CH32V305:
      - 23
      CH32V307:
      - 23
      CH32V317:
      - 38
    gui_profiles:
      serial:
      - v30x_serial_split
      - v30x_serial_compact
      usb:
      - v30x_usb
    working_backend_status:
      CH32V307: implemented_from_capture_not_hardware_verified
    identify_request_defaults:
      CH32V307:
        observed_device_id_native_usb: 112
        observed_device_type_native_usb: 23
        banner: MCU ISP & WCH.CN
    native_usb_defaults:
      CH32V307:
        plain_frame_protocol: true
        chunk_size: 56
        erase_sectors: 288
        set_baud_observed: false
        option_preamble_observed: false
        program_full_blocks: 193
        program_tail_len: 8
        program_flush_addr: 10816
        verify_full_blocks: 193
        verify_tail_len: 8
        verify_tail_addr: 10808
        project_format_version_min: 3
        common_selectors:
        - 4348:55e0
        - 1a86:55e0
    known_flows:
      native_usb_bootloader:
        status: decoded_from_capture
        chip: CH32V307VCT6
        protocol_shape: plain_usb_frames_without_57ab_55aa
        sequence:
        - A1
        - A7
        - A8_single
        - A7
        - A3
        - A4
        - A5_many
        - A5_flush
        - A3
        - A6_many
        - A2_reason_00
    protocol_variants:
    - uart_framed
    - usb_native_plain
    cross_check:
      official_bootloader_interfaces:
      - USART1
      - USB
      wchisp_device_type: 23
    protocol_note_serial: uart_framed serial path inferred; native USB path capture-driven
      for V307
  ch32x03x:
    option_profile: x035
    flash_defaults:
      default_chunk_size: 56
      default_initial_baud: 115200
      default_fast_baud: 1000000
    target_v1: true
    vendor_mcu_types:
    - 19
    chips:
    - CH32X033
    - CH32X035
    gui_profiles:
      serial:
      - x035_serial
      usb:
      - x035_usb
    protocol_variants:
    - usb_native_plain
    - uart_framed
    protocol_note: native USB path aligned to public x03x family reports and wchisp
      variant tables; serial path enabled from public wchisp metadata plus independent
      wch-web-isp implementation
  ch32v00x:
    flash_defaults:
      default_chunk_size: 56
      default_initial_baud: 115200
      default_fast_baud: 1000000
      default_preserve_user_word: true
    target_v1: true
    vendor_mcu_types:

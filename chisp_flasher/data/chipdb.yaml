    protocol_variants:
    - uart_framed
    - usb_native_plain
    protocol_note: uart_framed/native-usb path aligned to shared FV20x/V20x/V30x ISP
      engine; CH32F203 must stay split by device_type 0x18 vs 0x20
  wch_legacy_usb:

    chips:
    - CH32V002
    - CH32V003
    - CH32V004
    - CH32V005
    - CH32V006
    - CH32V007
    - CH32M007
    expected_device_types:
      CH32V002:
      - 33
      CH32V003:
      - 33
      CH32V004:
      - 33
      CH32V005:
      - 33
      CH32V006:
      - 33
      CH32V007:
      - 33
      CH32M007:
      - 33
    gui_profiles:
      serial:
      - v00x_serial
    protocol_variants:
    - uart_framed
    protocol_note: uart_framed serial path aligned to public CH32V00x bootloader support;
      USB stays disabled because CH32V00x has no USB ISP interface
  ch32l103:
    flash_defaults:
      default_chunk_size: 56
      default_initial_baud: 115200
      default_fast_baud: 1000000
      default_preserve_user_word: true
    target_v1: true
    vendor_mcu_types:
    - 21
    chips:
    - CH32L103
    expected_device_types:
      CH32L103:
      - 37
    gui_profiles:
      serial:
      - l103_serial
      usb:
      - l103_usb
    protocol_variants:
    - uart_framed
    - usb_native_plain
    protocol_note: uart_framed/native-usb path aligned to public CH32L103 support
      in wchisp and wch-web-isp; config write stays disabled until option profile
      is confirmed
  ch32f20x:

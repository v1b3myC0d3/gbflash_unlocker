name: Build GBFlash Unlocker (Linux)

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: write
    defaults:
      run:
        working-directory: .
    env:
      VERSION: ${{ github.event.release.tag_name || '0.0' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runs-on: ubuntu-22.04
          - arch: arm64
            runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0

      - name: Create directory for Python packages
        run: mkdir -p ${{ github.workspace }}/venv

      - name: Cache Python packages
        id: cache-pip
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/venv
          key: gbflash-unlock-linux-${{ matrix.arch }}-python-dependencies-20260630
          restore-keys: |
            gbflash-unlock-linux-${{ matrix.arch }}-python-dependencies-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python packages
        if: steps.cache-pip.outputs.cache-hit != 'true'
        run: |
          python -m pip install --upgrade pip
          python -m venv ${{ github.workspace }}/venv
          source ${{ github.workspace }}/venv/bin/activate
          pip install -r requirements-gbflash-unlock.txt

      - name: Build GBFlash Unlocker
        env:
          PYINSTALLER_CONFIG_DIR: ${{ github.workspace }}/.pyinstaller
        run: |
          source ${{ github.workspace }}/venv/bin/activate
          ./build_gbflash_unlock_linux.sh

      - name: Create tarball
        run: |
          tar_name="GBFlashUnlock-${{ env.VERSION }}_Linux-${{ matrix.arch }}.tar.gz"
          tar -czf "$tar_name" -C "dist/gbflash-unlock" .

      - name: Create artifact
        if: env.VERSION == '0.0'
        uses: actions/upload-artifact@v4
        with:
          name: GBFlashUnlock_Linux-${{ matrix.arch }}
          path: GBFlashUnlock-${{ env.VERSION }}_Linux-${{ matrix.arch }}.tar.gz

      - name: Upload release asset
        if: env.VERSION != '0.0'
        uses: softprops/action-gh-release@v2.0.8
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: GBFlashUnlock-${{ env.VERSION }}_Linux-${{ matrix.arch }}.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
